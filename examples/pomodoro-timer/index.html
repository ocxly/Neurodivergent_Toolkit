<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pomodoro Pro — OCXLY Neuro Lab</title>
  <meta name="description" content="A focus timer with work and break phases, a 2-minute quick start, and a gentle chime. Built for ADHD-friendly focus.">
  <meta name="color-scheme" content="dark light">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
  <script>try{if(localStorage.getItem('ndtk-theme')==='light')document.documentElement.classList.add('light')}catch(e){}</script>
  <style>
    :root{--bg:#0f172a;--surface:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--accent-contrast:#03263a;--border:#334155;--break:#34d399}
    html.light{--bg:#f8fafc;--surface:#ffffff;--text:#0f172a;--muted:#475569;--accent:#0369a1;--accent-contrast:#fff;--border:#cbd5e1;--break:#059669}
    *{box-sizing:border-box}
    body{font-family:Lexend,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;line-height:1.7;text-align:center}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:640px;margin:0 auto;padding:16px 20px;text-align:left}
    a{color:var(--accent)}
    button{font:inherit;cursor:pointer}
    .toggle,.home{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:10px 14px;border-radius:10px;text-decoration:none}
    .toggle:hover,.home:hover{border-color:var(--accent)}
    :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px}
    main{max-width:640px;margin:0 auto;padding:8px 20px 64px}
    h1{font-size:1.8rem}
    .phase{font-weight:600;letter-spacing:.03em;color:var(--accent);text-transform:uppercase}
    .phase.break{color:var(--break)}
    #time{font-size:5rem;margin:6px 0;font-variant-numeric:tabular-nums}
    .fields{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:12px 0}
    .field{text-align:left}
    label{display:block;color:var(--muted);font-size:.85rem;margin-bottom:4px}
    input{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)}
    input#task{width:min(320px,80vw)}
    input.num{width:80px}
    .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:18px 0}
    .btn{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:13px 18px;border-radius:12px}
    .btn:hover{border-color:var(--accent)}
    .btn.primary{background:var(--accent);color:var(--accent-contrast);border-color:transparent;font-weight:600}
    #stats{margin-top:20px;padding:15px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted)}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="home" href="../../index.html">← Home</a>
    <button class="toggle" onclick="toggleTheme()" aria-label="Toggle light and dark theme">🌗 Theme</button>
  </header>
  <main>
    <h1>⏰ Pomodoro Pro</h1>

    <div class="fields">
      <div class="field">
        <label for="task">Task for this session</label>
        <input id="task" placeholder="One small task">
      </div>
    </div>
    <div class="fields">
      <div class="field"><label for="work">Work (min)</label><input id="work" class="num" type="number" min="1" value="25"></div>
      <div class="field"><label for="break">Break (min)</label><input id="break" class="num" type="number" min="1" value="5"></div>
    </div>

    <p class="phase" id="phaseLabel">Work</p>
    <div id="time" role="timer" aria-live="off">25:00</div>

    <div class="controls">
      <button class="btn primary" id="startBtn" onclick="toggleTimer()">Start</button>
      <button class="btn" onclick="resetTimer()">Reset</button>
      <button class="btn" onclick="twoMinuteStart()">2-Minute Start</button>
    </div>

    <div id="stats" role="status" aria-live="polite">Completed focus sessions: 0</div>
  </main>

  <script>
    var secs=1500, timer=null, running=false, onBreak=false;
    var sessions=+(localStorage.getItem('ndtk-sessions')||0);
    var timeEl=document.getElementById('time'),
        phaseEl=document.getElementById('phaseLabel'),
        statsEl=document.getElementById('stats'),
        startBtn=document.getElementById('startBtn'),
        workEl=document.getElementById('work'),
        breakEl=document.getElementById('break');

    function mins(el, fallback){ var v=parseInt(el.value,10); return (v>0?v:fallback); }

    function render(){
      var m=Math.floor(secs/60), s=secs%60;
      var t=m+':'+String(s).padStart(2,'0');
      timeEl.textContent=t;
      document.title=(running?(onBreak?'☕ ':'⏳ '):'')+t+' — Pomodoro Pro';
      phaseEl.textContent=onBreak?'Break':'Work';
      phaseEl.classList.toggle('break', onBreak);
      statsEl.textContent='Completed focus sessions: '+sessions;
    }
    function chime(){
      try{
        var a=new (window.AudioContext||window.webkitAudioContext)();
        var o=a.createOscillator(), g=a.createGain();
        o.type='sine'; o.frequency.value=660;
        g.gain.setValueAtTime(0.0001,a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.3,a.currentTime+0.05);
        g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.9);
        o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.9);
      }catch(e){}
    }
    function phaseComplete(){
      chime();
      if(!onBreak){
        sessions++; localStorage.setItem('ndtk-sessions', sessions);
        onBreak=true; secs=mins(breakEl,5)*60;
      }else{
        onBreak=false; secs=mins(workEl,25)*60;
      }
      render();
    }
    function start(){
      running=true; startBtn.textContent='Pause';
      clearInterval(timer);
      timer=setInterval(function(){
        if(secs>0){ secs--; render(); }
        else { clearInterval(timer); running=false; startBtn.textContent='Start'; phaseComplete(); }
      },1000);
    }
    function pause(){ running=false; startBtn.textContent='Start'; clearInterval(timer); render(); }
    function toggleTimer(){ running ? pause() : start(); }
    function resetTimer(){
      clearInterval(timer); running=false; onBreak=false;
      startBtn.textContent='Start'; secs=mins(workEl,25)*60; render();
    }
    function twoMinuteStart(){
      clearInterval(timer); onBreak=false; secs=120; render(); start();
    }
    resetTimer();

    function toggleTheme(){
      var el=document.documentElement; el.classList.toggle('light');
      try{localStorage.setItem('ndtk-theme', el.classList.contains('light')?'light':'dark')}catch(e){}
    }
  </script>
</body>
</html>
