<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Chunker — OCXLY Neuro Lab</title>
  <meta name="description" content="Break a big or vague task into small, checkable steps. Paste your own steps or use a starter scaffold.">
  <meta name="color-scheme" content="dark light">
  <script>try{if(localStorage.getItem('ndtk-theme')==='light')document.documentElement.classList.add('light')}catch(e){}</script>
  <style>
    /* Self-hosted Lexend (SIL OFL) — no external requests. See assets/fonts/LICENSE-Lexend.txt */
    @font-face{font-family:'Lexend';font-style:normal;font-weight:300 700;font-display:swap;src:url('../../assets/fonts/lexend-latin.woff2') format('woff2')}
    :root{--bg:#0f172a;--surface:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--accent-contrast:#03263a;--border:#334155;--done:#34d399}
    html.light{--bg:#f8fafc;--surface:#ffffff;--text:#0f172a;--muted:#475569;--accent:#0369a1;--accent-contrast:#fff;--border:#cbd5e1;--done:#059669}
    *{box-sizing:border-box}
    body{font-family:Lexend,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;line-height:1.7}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:720px;margin:0 auto;padding:16px 20px}
    a{color:var(--accent)}
    button{font:inherit;cursor:pointer}
    .toggle,.home{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:10px 14px;border-radius:10px;text-decoration:none}
    .toggle:hover,.home:hover{border-color:var(--accent)}
    :focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-radius:6px}
    main{max-width:720px;margin:0 auto;padding:8px 20px 64px}
    h1{font-size:1.8rem}
    .lead{color:var(--muted)}
    textarea{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font:inherit}
    .btn{background:var(--accent);color:var(--accent-contrast);border:none;padding:13px 20px;border-radius:12px;font-weight:600;margin-top:10px}
    .hint{color:var(--muted);font-size:.9rem}
    #progress{margin:18px 0 8px;color:var(--muted)}
    ul{list-style:none;padding:0}
    li{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin:8px 0}
    li input{margin-top:5px;width:20px;height:20px;accent-color:var(--accent)}
    li label{cursor:pointer}
    li.done label{text-decoration:line-through;color:var(--muted)}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="home" href="../../index.html">← Home</a>
    <button class="toggle" onclick="toggleTheme()" aria-label="Toggle light and dark theme">🌗 Theme</button>
  </header>
  <main>
    <h1>🧩 Task Chunker</h1>
    <p class="lead">Turn a big or fuzzy task into small, checkable steps. Write one step per line, or just name the task and get a starter scaffold.</p>

    <label for="task" class="hint">Your task (or one step per line)</label>
    <textarea id="task" rows="5" placeholder="Example: Tidy my desk&#10;— or write your own steps, one per line —"></textarea>
    <br>
    <button class="btn" onclick="chunk()">Break into steps</button>

    <p id="progress" role="status" aria-live="polite"></p>
    <ul id="out"></ul>
  </main>

  <script>
    var out=document.getElementById('out'),
        progress=document.getElementById('progress'),
        taskEl=document.getElementById('task');

    function scaffold(task){
      return [
        'Name what "done" looks like for: ' + task,
        'Clear space / gather what you need',
        'Do the smallest possible first step',
        'Work on ' + task + ' for 10 minutes',
        'Take a short break',
        'Do the next small step',
        'Check progress and stop or continue'
      ];
    }
    function updateProgress(){
      var boxes=out.querySelectorAll('input[type=checkbox]');
      var done=out.querySelectorAll('input[type=checkbox]:checked').length;
      progress.textContent = boxes.length ? (done + ' of ' + boxes.length + ' steps done' + (done===boxes.length?' 🎉':'')) : '';
    }
    function chunk(){
      var raw=taskEl.value.trim();
      out.innerHTML='';
      if(!raw){ progress.textContent='Type a task first.'; return; }
      var lines=raw.split(/\n/).map(function(s){return s.trim();}).filter(Boolean);
      var steps = lines.length>1 ? lines : scaffold(raw);
      steps.forEach(function(text,i){
        var li=document.createElement('li');
        var id='step'+i;
        var cb=document.createElement('input');
        cb.type='checkbox'; cb.id=id;
        cb.addEventListener('change',function(){ li.classList.toggle('done',cb.checked); updateProgress(); });
        var label=document.createElement('label');
        label.htmlFor=id; label.textContent=text;
        li.appendChild(cb); li.appendChild(label); out.appendChild(li);
      });
      updateProgress();
    }

    function toggleTheme(){
      var el=document.documentElement; el.classList.toggle('light');
      try{localStorage.setItem('ndtk-theme', el.classList.contains('light')?'light':'dark')}catch(e){}
    }
  </script>
</body>
</html>
