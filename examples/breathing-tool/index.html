<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Breathing Tool</title><link href='https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap' rel='stylesheet'><style>body{font-family:Lexend,sans-serif;text-align:center;background:#0f172a;color:white;padding:40px}.circle{width:180px;height:180px;border-radius:50%;background:#38bdf8;margin:30px auto;animation:breathe 8s infinite}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}</style></head><body><h1>🌬️ Calm Breathing Tool</h1><p>Breathe in as the circle grows. Breathe out as it shrinks.</p><div class='circle'></div></body></html>
